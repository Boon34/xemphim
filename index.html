<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lời mời đặc biệt ✨</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #0b0b0b;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 400px;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: #e50914; /* Màu đỏ Netflix */
        }

        .movie-poster {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            position: relative;
            height: 50px;
        }

        button {
            padding: 10px 30px;
            font-size: 1rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #yesBtn {
            background-color: #e50914;
            color: white;
            font-weight: bold;
        }

        #noBtn {
            background-color: #ffffff;
            color: #333;
            position: absolute;
        }

        .success-msg {
            display: none;
            font-size: 1.2rem;
            color: #4CAF50;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container" id="mainCard">
    <h1>Đi xem "Swapped" cùng anh nhé? 🍿</h1>
    
    <img src="swapped-poster.jpg" alt="Swapped Movie" class="movie-poster" onerror="this.src='https://via.placeholder.com/400x600?text=Loi+hien+thi+anh'">
    
    <div class="buttons">
        <button id="yesBtn" onclick="celebrate()">Đồng ý!</button>
        <button id="noBtn" onmouseover="moveButton()">Không</button>
    </div>
    <div id="message" class="success-msg">Hẹn gặp em vào cuối tuần này nhé! ❤️</div>
</div>

<script>
    function moveButton() {
        const btn = document.getElementById('noBtn');
        // Tính toán vị trí ngẫu nhiên để nút "Không" chạy mất khi di chuột vào
        const x = Math.random() * (window.innerWidth - btn.offsetWidth - 50);
        const y = Math.random() * (window.innerHeight - btn.offsetHeight - 50);
        
        btn.style.position = 'fixed';
        btn.style.left = x + 'px';
        btn.style.top = y + 'px';
    }

    function celebrate() {
        const mainCard = document.getElementById('mainCard');
        document.getElementById('noBtn').style.display = 'none';
        document.getElementById('yesBtn').style.transform = 'scale(1.2)';
        document.getElementById('message').style.display = 'block';
        
        // Hiệu ứng thông báo đơn giản
        alert("Anh biết là em sẽ không từ chối mà! 😉");
    }
</script>

</body>
</html>
